schema_version = 1

[filters.bundle-install]
description = "Compact bundle install output"
match_command = "^bundle\\s+install"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Fetching\\s",
  "^Resolving\\s",
  "^Installing\\s",
]
max_lines = 40
on_empty = "bundle install: ok"

[[tests.bundle-install]]
name = "basic bundle install"
input = """
Fetching gem metadata from https://rubygems.org/
Resolving dependencies...
Installing rake 13.0.0
Installing rails 7.0.0
Bundle complete! 5 gems specified.
"""
expected = "Bundle complete! 5 gems specified."

[[tests.bundle-install]]
name = "with error"
input = """
Fetching gem metadata from https://rubygems.org/
Resolving dependencies...
Could not find compatible versions
"""
expected = "Could not find compatible versions"
