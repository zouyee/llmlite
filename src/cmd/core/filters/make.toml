schema_version = 1

[filters.make]
description = "Compact make output - strip entering/leaving directory noise"
match_command = "^make\\b"
strip_ansi = true
strip_lines_matching = [
  "^make\\[\\d+\\]+: Entering directory",
  "^make\\[\\d+\\]+: Leaving directory",
  "^make\\s+\\(\\d+\\): Entering",
  "^make\\s+\\(\\d+\\): Leaving",
  "^\\s*$",
]
max_lines = 50
on_empty = "make: ok"

[[tests.make]]
name = "strips entering/leaving lines"
input = """
make[1]: Entering directory '/home/user/project'
gcc -O2 -Wall -c foo.c -o foo.o
make[1]: Leaving directory '/home/user/project'
"""
expected = """gcc -O2 -Wall -c foo.c -o foo.o"""

[[tests.make]]
name = "clean make"
input = "make: Nothing to be done for 'all'"
expected = "make: Nothing to be done for 'all'"

[[tests.make]]
name = "empty input returns on_empty"
input = ""
expected = "make: ok"
