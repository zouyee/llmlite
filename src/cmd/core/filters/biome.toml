schema_version = 1

[filters.biome]
description = "Compact Biome lint/format output - strip noise, keep diagnostics"
match_command = "^biome\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^Checked \\d+ file",
  "^Fixed \\d+ file",
  "^The following command",
  "^Run it with",
]
max_lines = 50
on_empty = "biome: ok"

[[tests.biome]]
name = "lint strips noise, keeps diagnostics"
input = """
Checked 42 files in 0.5s

src/app.tsx:5:3 lint/suspicious/noExplicitAny ━━━━━━━━━━━━━━━━━━━━
  × Unexpected any. Specify a different type.
  3 │ interface Props {
  4 │   data: any;
  5 │         ^^^

Found 2 errors.
"""
expected = """src/app.tsx:5:3 lint/suspicious/noExplicitAny ━━━━━━━━━━━━━━━━━━━━
  × Unexpected any. Specify a different type.
  3 │ interface Props {
  4 │   data: any;
  5 │         ^^^

Found 2 errors."""

[[tests.biome]]
name = "clean check"
input = "Checked 42 files in 0.3s\n"
expected = "biome: ok"
