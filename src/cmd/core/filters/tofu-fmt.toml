schema_version = 1

[filters.tofu-fmt]
description = "Compact OpenTofu fmt output"
match_command = "^tofu\\s+fmt"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
max_lines = 30
on_empty = "tofu fmt: no changes"

[[tests.tofu-fmt]]
name = "files formatted"
input = """
main.tf
variables.tf
"""
expected = """main.tf
variables.tf"""
