schema_version = 1

[filters.shellcheck]
description = "Compact shellcheck output"
match_command = "^shellcheck\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
max_lines = 50

[[tests.shellcheck]]
name = "basic shellcheck"
input = """
In script.sh line 5:
echo "Hello $name"
       ^-------^ SC2086: Double quote to prevent globbing.
"""
expected = """In script.sh line 5:
echo "Hello $name"
       ^-------^ SC2086: Double quote to prevent globbing."""
