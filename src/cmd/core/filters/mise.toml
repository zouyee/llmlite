schema_version = 1

[filters.mise]
description = "Compact mise output"
match_command = "^mise\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
max_lines = 30

[[tests.mise]]
name = "mise list"
input = """
node    20.0.0  ~/.mise/tools/nodejs/node-20.0.0
python  3.12.0  ~/.mise/tools/python/python-3.12.0
"""
expected = """node    20.0.0  ~/.mise/tools/nodejs/node-20.0.0
python  3.12.0  ~/.mise/tools/python/python-3.12.0"""
