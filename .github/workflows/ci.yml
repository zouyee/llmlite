name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig_version: ['0.15.0']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ matrix.zig_version }}

      - name: Cache Zig build
        uses: actions/cache@v4
        with:
          path: zig-cache
          key: ${{ runner.os }}-zig-${{ matrix.zig_version }}-${{ hashFiles('**/*.zig', '**/build.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-${{ matrix.zig_version }}-

      - name: Build
        run: zig build

      - name: Run tests
        run: zig build test

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: '0.15.0'

      - name: Run build release-safe
        run: zig build --release=safe

  security:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: '0.15.0'

      - name: Run build
        run: zig build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t llmlite:test .

      - name: Verify image exists
        run: docker image inspect llmlite:test

  makefile:
    name: Makefile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: '0.15.0'

      - name: Install make
        run: |
          if ! command -v make &> /dev/null; then
            apt-get update && apt-get install -y make
          fi

      - name: Show help
        run: make help

      - name: Build with make
        run: make build

      - name: Run tests with make
        run: make test

      - name: Docker build with make
        run: make docker-build

      - name: Clean
        run: make clean
